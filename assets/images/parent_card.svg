<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C5CE0"/>
      <stop offset="100%" stop-color="#4B38A8"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9D85E8"/>
      <stop offset="100%" stop-color="#7B5CE0"/>
    </linearGradient>
    <linearGradient id="kidshirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF9C7C"/>
      <stop offset="100%" stop-color="#FF6B40"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="44" fill="url(#bg)"/>
  <!-- Soft inner highlight -->
  <ellipse cx="80" cy="55" rx="65" ry="40" fill="white" opacity="0.06"/>

  <!-- ===== PARENT (left, taller) ===== -->
  <!-- Hair -->
  <path d="M50 64 Q50 38 78 38 Q106 38 106 64 Q98 44 78 46 Q58 44 50 64Z" fill="#2D1A7A"/>
  <!-- Head -->
  <circle cx="78" cy="70" r="26" fill="#FFDACC"/>
  <!-- Ears -->
  <ellipse cx="52" cy="70" rx="5" ry="7" fill="#FFDACC"/>
  <ellipse cx="104" cy="70" rx="5" ry="7" fill="#FFDACC"/>
  <!-- Eyes -->
  <circle cx="70" cy="67" r="4.5" fill="#2D1A7A"/>
  <circle cx="86" cy="67" r="4.5" fill="#2D1A7A"/>
  <circle cx="71.5" cy="65.5" r="1.8" fill="white"/>
  <circle cx="87.5" cy="65.5" r="1.8" fill="white"/>
  <!-- Smile -->
  <path d="M68 80 Q78 88 88 80" stroke="#2D1A7A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="70" y="93" width="16" height="13" rx="4" fill="#FFDACC"/>
  <!-- Body/shirt -->
  <rect x="50" y="104" width="56" height="56" rx="14" fill="url(#shirt)"/>
  <!-- Left arm -->
  <rect x="28" y="106" width="22" height="13" rx="6.5" fill="url(#shirt)"/>
  <circle cx="27" cy="112" r="7.5" fill="#FFDACC"/>
  <!-- Right arm (toward child) -->
  <rect x="106" y="106" width="24" height="13" rx="6.5" fill="url(#shirt)"/>
  <!-- Legs -->
  <rect x="52" y="156" width="20" height="28" rx="10" fill="#2D1A7A"/>
  <rect x="84" y="156" width="20" height="28" rx="10" fill="#2D1A7A"/>

  <!-- ===== CHILD (right, shorter) ===== -->
  <!-- Hair (blonde) -->
  <path d="M122 78 Q122 61 142 61 Q162 61 162 78 Q155 64 142 65 Q129 64 122 78Z" fill="#FFD93D"/>
  <!-- Pigtail / ribbon -->
  <circle cx="162" cy="68" rx="7" r="7" fill="#FF6BAB"/>
  <!-- Head -->
  <circle cx="142" cy="83" r="19" fill="#FFDACC"/>
  <!-- Ears -->
  <ellipse cx="123" cy="83" rx="4" ry="5.5" fill="#FFDACC"/>
  <ellipse cx="161" cy="83" rx="4" ry="5.5" fill="#FFDACC"/>
  <!-- Eyes -->
  <circle cx="136" cy="81" r="3.5" fill="#2D1A7A"/>
  <circle cx="148" cy="81" r="3.5" fill="#2D1A7A"/>
  <circle cx="137.2" cy="79.8" r="1.4" fill="white"/>
  <circle cx="149.2" cy="79.8" r="1.4" fill="white"/>
  <!-- Smile -->
  <path d="M135 91 Q142 97 149 91" stroke="#2D1A7A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Neck -->
  <rect x="135" y="100" width="12" height="10" rx="3" fill="#FFDACC"/>
  <!-- Body/shirt -->
  <rect x="122" y="108" width="40" height="42" rx="10" fill="url(#kidshirt)"/>
  <!-- Left arm (reaching to parent) -->
  <rect x="100" y="110" width="22" height="12" rx="6" fill="url(#kidshirt)"/>
  <!-- Right arm -->
  <rect x="162" y="110" width="14" height="12" rx="6" fill="url(#kidshirt)"/>
  <circle cx="176" cy="116" rx="5.5" r="5.5" fill="#FFDACC"/>
  <!-- Legs -->
  <rect x="124" y="147" width="15" height="23" rx="7.5" fill="#CC4400"/>
  <rect x="147" y="147" width="15" height="23" rx="7.5" fill="#CC4400"/>

  <!-- Joined hands in centre -->
  <circle cx="119" cy="116" r="9" fill="#FFDACC"/>

  <!-- ===== HEART floating above ===== -->
  <path d="M100 37 C100 31 94.5 27 89 31 C83.5 27 78 31 78 37 C78 44.5 89 54 100 37Z" fill="#FF6BAB"/>
  <circle cx="85" cy="30" r="2" fill="white" opacity="0.55"/>

  <!-- ===== SPARKLES ===== -->
  <!-- Top-left star -->
  <path d="M32 32 L34.2 39 L41.5 39 L35.6 43.3 L37.8 50.2 L32 46 L26.2 50.2 L28.4 43.3 L22.5 39 L29.8 39Z" fill="#FFD93D" opacity="0.88"/>
  <!-- Top-right star -->
  <path d="M170 27 L171.8 32.5 L177.5 32.5 L173.1 35.7 L174.9 41.2 L170 38 L165.1 41.2 L166.9 35.7 L162.5 32.5 L168.2 32.5Z" fill="#6BCB77" opacity="0.82"/>
  <!-- Dots -->
  <circle cx="27" cy="160" r="4.5" fill="#4DABF7" opacity="0.7"/>
  <circle cx="173" cy="163" r="4" fill="#FF6BAB" opacity="0.7"/>
  <circle cx="20" cy="95" r="3" fill="#FFD93D" opacity="0.5"/>
  <circle cx="180" cy="90" r="3" fill="#6BCB77" opacity="0.5"/>
</svg>
